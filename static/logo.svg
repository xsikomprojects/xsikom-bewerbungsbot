<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3D5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1923;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2DD4A8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hintergrund Kreis -->
  <circle cx="100" cy="100" r="90" fill="url(#bg)" stroke="#00B4D8" stroke-width="4"/>
  
  <!-- XsiKOM Text -->
  <text x="100" y="95" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#text)" text-anchor="middle">XsiKOM</text>
  
  <!-- Bot Text -->
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E8EDF2" text-anchor="middle" letter-spacing="2">BOT</text>
  
  <!-- KI Chip Symbol -->
  <rect x="75" y="145" width="50" height="12" rx="6" fill="#FFD93D"/>
  <circle cx="85" cy="151" r="3" fill="#0F1923"/>
  <circle cx="100" cy="151" r="3" fill="#0F1923"/>
  <circle cx="115" cy="151" r="3" fill="#0F1923"/>
</svg>